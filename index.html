  <style>
:root { 
    --bg: #050505; 
    --panel: #0a0a0c;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --vv-blue: #0A84FF;
    --gold: #D4AF37; 
    --safe-green: #34c759;
    --danger: #ff3b30;
    --text-main: #ffffff;
    --text-muted: #8e8e93;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

body { 
    background: var(--bg); 
    color: var(--text-main); 
    min-height: 100vh; 
    display: flex;
    overflow: hidden;
}

/* ─── FIX CRITIC: app-container umple tot spatiul ─── */
#app-container {
    display: flex;
    flex: 1;
    min-height: 100vh;
    min-width: 0;
    overflow: hidden;
}

/* ============ LOGIN SCREEN ============ */
#login-screen { 
    position: fixed; 
    inset: 0; 
    background: var(--bg); 
    z-index: 99999; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    transition: opacity 0.5s;
    padding: 20px;
}
#login-screen.hidden {
    opacity: 0;
    pointer-events: none;
}
.logo-box { font-size: 40px; font-weight: 900; letter-spacing: 5px; color: #fff; margin-bottom: 10px; }
.logo-sub { font-size: 12px; color: var(--text-muted); letter-spacing: 4px; margin-bottom: 40px; text-transform: uppercase; }
.login-input { 
    background: rgba(255,255,255,0.06) !important; 
    border: 1px solid rgba(255,255,255,0.12); 
    padding: 18px 25px; 
    border-radius: 12px; 
    color: #fff !important; 
    font-size: 16px; 
    text-align: center; 
    letter-spacing: 3px; 
    outline: none; 
    margin-bottom: 20px; 
    width: 100%;
    max-width: 320px;
    transition: 0.3s;
    -webkit-appearance: none;
    appearance: none;
}
.login-input:focus { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.08) !important; }
.login-input:-webkit-autofill,
.login-input:-webkit-autofill:hover,
.login-input:-webkit-autofill:focus,
.login-input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 100px rgba(30,30,40,0.98) inset !important;
    -webkit-text-fill-color: #ffffff !important;
    caret-color: #ffffff;
    border: 1px solid rgba(255,255,255,0.2) !important;
    border-radius: 12px !important;
}
.login-btn { 
    background: #fff; 
    color: #000; 
    border: none; 
    padding: 18px; 
    width: 100%;
    max-width: 320px;
    border-radius: 12px; 
    font-weight: 700; 
    cursor: pointer; 
    text-transform: uppercase; 
    letter-spacing: 1px; 
    transition: 0.2s; 
}
.login-btn:active { transform: scale(0.98); }

/* ============ LIGHTBOX ============ */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
.lb-close { position: absolute; top: 20px; right: 25px; color: #fff; font-size: 30px; cursor: pointer; transition: 0.2s; z-index: 100001; }
.lb-close:hover { color: var(--danger); }
.lb-nav { position: absolute; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.6); font-size: 35px; cursor: pointer; padding: 15px; transition: 0.3s; z-index: 100001; }
.lb-nav:hover { color: #fff; }
.lb-prev { left: 10px; }
.lb-next { right: 10px; }
#lb-img { max-width: 90%; max-height: 85%; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); object-fit: contain; }

/* ============ SIDEBAR ============ */
.sidebar { 
    width: 250px; 
    min-width: 250px;
    background: var(--panel); 
    border-right: 1px solid var(--glass-border); 
    display: flex; 
    flex-direction: column; 
    padding: 30px 0; 
    z-index: 10;
    overflow-y: auto;
    flex-shrink: 0;
}
.sidebar-header { padding: 0 25px; margin-bottom: 20px; }
.sidebar-title { font-size: 20px; font-weight: 800; letter-spacing: 2px; margin-bottom: 5px; }
.sidebar-subtitle { font-size: 10px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }

.system-money-box { padding: 0 25px; margin-bottom: 25px; }
.money-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: 600; }
.money-value { font-size: 16px; color: var(--safe-green); font-weight: 700; font-family: monospace; }

.nav-item { padding: 16px 25px; display: flex; align-items: center; gap: 12px; color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.3s; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--glass-bg); color: #fff; }
.nav-item.active { background: rgba(255,255,255,0.05); color: #fff; border-left-color: var(--vv-blue); }
.nav-item i { width: 18px; text-align: center; font-size: 15px; }
.nav-badge { background: var(--danger); color: #fff; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 10px; margin-left: auto; display: none; }

/* ============ MAIN CONTENT ============ */
.main-content { 
    flex: 1; 
    padding: 35px 40px; 
    overflow-y: auto; 
    background: var(--bg); 
    position: relative;
    min-width: 0;
    height: 100vh;
}
.section { display: none; animation: fadeIn 0.4s; }
.section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.section-header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
.section-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
.section-desc { font-size: 13px; color: var(--text-muted); }

.btn-delete-all { background: rgba(255,59,48,0.1); color: var(--danger); border: 1px solid rgba(255,59,48,0.3); padding: 12px 20px; border-radius: 8px; font-weight: 800; font-size: 11px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.btn-delete-all:hover { background: var(--danger); color: #fff; }

/* ============ GRID ============ */
.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.photo-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
.photo-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.15); }
.photo-img { width: 100%; height: 200px; object-fit: cover; background: #111; cursor: zoom-in; }
.photo-info { padding: 16px; }
.photo-msg { font-size: 13px; color: #fff; margin-bottom: 10px; line-height: 1.5; }
.photo-meta { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; text-transform: uppercase; letter-spacing: 1px; }
.flag-badge { background: rgba(255,59,48,0.1); color: var(--danger); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; border: 1px solid rgba(255,59,48,0.3); margin-bottom: 10px; display: inline-block; }

/* ============ TABLE ============ */
.vv-table { width: 100%; border-collapse: collapse; background: var(--glass-bg); border-radius: 16px; overflow: hidden; border: 1px solid var(--glass-border); }
.vv-table th { background: rgba(255,255,255,0.02); padding: 16px; text-align: left; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--glass-border); }
.vv-table td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 13px; font-weight: 500; overflow-wrap: break-word; word-break: break-word; }
.vv-table tr:hover td { background: rgba(255,255,255,0.02); }
.rank-gold { color: var(--gold); font-weight: 900; font-size: 16px; }
.badge-onyx { background: rgba(10, 132, 255, 0.1); color: var(--vv-blue); border: 1px solid rgba(10, 132, 255, 0.3); padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }

/* ============ BUTTONS ============ */
.action-row { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
.btn-approve { flex: 1; min-width: 100px; padding: 12px; border: none; border-radius: 8px; background: #fff; color: #000; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 12px; text-transform: uppercase; }
.btn-reject { flex: 1; min-width: 100px; padding: 12px; border: 1px solid var(--danger); border-radius: 8px; background: rgba(255,59,48,0.1); color: var(--danger); font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 12px; text-transform: uppercase; }
.btn-reply { padding: 8px 14px; border: 1px solid var(--vv-blue); border-radius: 8px; background: rgba(10, 132, 255, 0.1); color: var(--vv-blue); font-weight: 700; cursor: pointer; font-size: 11px; text-transform: uppercase; }

/* ============ KEYS ============ */
.key-generator-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 25px; border-radius: 16px; max-width: 500px; }
.btn-primary { background: #fff; color: #000; border: none; padding: 14px 22px; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; width: 100%; }
.btn-primary:active { transform: scale(0.98); }
#keys-list { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
.key-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); padding: 14px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); font-family: monospace; font-size: 15px; letter-spacing: 2px; flex-wrap: wrap; gap: 10px; }
.key-status { font-size: 11px; font-weight: 700; color: var(--safe-green); letter-spacing: 1px; font-family: -apple-system, sans-serif; }

/* ============ RESPONSIVE TABLETE MICI ============ */
@media (max-width: 768px) {
    body { flex-direction: column; overflow-y: auto; overflow-x: hidden; height: auto; }
    #app-container { flex-direction: column; overflow: visible; height: auto; min-height: 100vh; }
    .sidebar { 
        width: 100%; min-width: unset; flex-direction: row; flex-wrap: wrap;
        padding: 15px 12px; border-right: none; border-bottom: 1px solid var(--glass-border);
        gap: 6px; overflow-y: visible; height: auto;
    }
    .sidebar-header { width: 100%; padding: 0 5px 12px 5px; margin-bottom: 8px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
    .sidebar-title { font-size: 18px; }
    .system-money-box { padding: 0 5px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .money-label { margin-bottom: 0; }
    .nav-item { padding: 10px 12px; border-radius: 10px; border-left: none; font-size: 12px; flex: 1; min-width: 48px; justify-content: center; text-align: center; gap: 6px; }
    .nav-item.active { background: rgba(255,255,255,0.08); border-left: none; border-bottom: 2px solid var(--vv-blue); }
    .nav-item span:not(.nav-badge) { display: none; }
    .main-content { padding: 20px 15px 40px; height: auto; flex: none; overflow-y: visible; }
    .section-header-row { flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .btn-delete-all { width: 100%; justify-content: center; }
    .grid-container { grid-template-columns: 1fr; gap: 15px; }
    .vv-table { font-size: 12px; }
    .vv-table th { padding: 10px 8px; font-size: 10px; }
    .vv-table td { padding: 10px 8px; font-size: 12px; }
    .key-generator-card { max-width: 100%; }
    .section-title { font-size: 18px; }
}

/* ============ TELEFOANE MICI ============ */
@media (max-width: 480px) {
    .nav-item { min-width: 44px; font-size: 10px; padding: 10px 8px; }
    .action-row { flex-direction: column; }
    .btn-approve, .btn-reject { min-width: unset; }
}

/* ============ TABLETE MARI (768–1024) ============ */
@media (min-width: 768px) {
    .nav-item span:not(.nav-badge) { display: inline; }
}

@media (min-width: 768px) and (max-width: 1024px) {
    body { flex-direction: row; overflow: hidden; }
    #app-container { flex-direction: row; }
    .sidebar { width: 220px; min-width: 220px; flex-direction: column; flex-wrap: nowrap; height: 100vh; overflow-y: auto; border-right: 1px solid var(--glass-border); padding: 30px 0; }
    .sidebar-header { width: auto; padding: 0 20px 15px; border-bottom: 1px solid var(--glass-border); margin-bottom: 15px; display: block; }
    .system-money-box { width: auto; padding: 0 20px 15px; display: block; margin-bottom: 10px; }
    .money-label { margin-bottom: 4px; }
    .nav-item { justify-content: flex-start; text-align: left; padding: 14px 20px; flex: none; min-width: unset; border-radius: 0; border-left: 3px solid transparent; border-bottom: none; width: 100%; }
    .nav-item.active { border-left-color: var(--vv-blue); border-bottom: none; }
    .main-content { flex: 1; padding: 30px 30px; height: 100vh; overflow-y: auto; }
    .grid-container { grid-template-columns: repeat(2, 1fr); gap: 18px; }
}

/* ============ DESKTOP (1024+) ============ */
@media (min-width: 1024px) {
    body { flex-direction: row; overflow: hidden; }
    #app-container { flex-direction: row; }
    .sidebar { width: 240px; min-width: 240px; flex-direction: column; flex-wrap: nowrap; height: 100vh; overflow-y: auto; border-right: 1px solid var(--glass-border); padding: 30px 0; }
    .sidebar-header { width: auto; padding: 0 25px 20px; margin-bottom: 10px; display: block; }
    .system-money-box { width: auto; padding: 0 25px 20px; margin-bottom: 10px; display: block; }
    .nav-item { justify-content: flex-start; text-align: left; padding: 16px 25px; flex: none; min-width: unset; border-radius: 0; border-left: 3px solid transparent; border-bottom: none; width: 100%; }
    .nav-item.active { border-left-color: var(--vv-blue); border-bottom: none; }
    .main-content { flex: 1; padding: 40px 50px; height: 100vh; overflow-y: auto; }
    .section-header-row { flex-direction: row; flex-wrap: nowrap; align-items: flex-start; }
    .grid-container { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .vv-table td { max-width: 300px; }
}

/* ============ CEO EXECUTIVE ============ */
.logout-btn { color: rgba(255, 59, 48, 0.6) !important; border-top: 1px solid rgba(255, 59, 48, 0.1); margin-top: 8px; }
.logout-btn:hover { color: #ff3b30 !important; background: rgba(255, 59, 48, 0.08) !important; }

button, .nav-item, .btn-approve, .btn-reject, .btn-reply, .btn-primary, .login-btn, .btn-delete-all {
    min-height: 44px !important;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

.main-content { padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px)) !important; }
#login-screen { padding-top: calc(40px + env(safe-area-inset-top, 0px)); padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px)); }
.sidebar { padding-top: calc(30px + env(safe-area-inset-top, 0px)); }
.photo-img { -webkit-user-select: none; user-select: none; }

/* CEO Map */
.ceo-popup .leaflet-popup-content-wrapper { background: #0a0a0c !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 12px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important; color: #fff !important; padding: 0 !important; }
.ceo-popup .leaflet-popup-content { margin: 0 !important; }
.ceo-popup .leaflet-popup-tip { background: #0a0a0c !important; }
.ceo-popup .leaflet-popup-close-button { color: rgba(255,255,255,0.4) !important; }

/* SCAN LINE */
.scan-line { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: var(--gold); box-shadow: 0 0 15px var(--gold); animation: scan 4s linear infinite; z-index: 200; opacity: 0.4; pointer-events: none; }
@keyframes scan { from { top: 0; } to { top: 100%; } }

/* TABS */
.btn-tab { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: 0.2s; }
.btn-tab.active { background: rgba(10,132,255,0.15); border-color: rgba(10,132,255,0.4); color: var(--vv-blue); }
.btn-tab:hover { color: #fff; }

/* CARDS */
.contract-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 18px; margin-bottom: 12px; }
.feedback-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 18px; margin-bottom: 12px; }
.feedback-card.bug { border-color: rgba(255,59,48,0.2); }
.talent-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
.rank-select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 12px; outline: none; cursor: pointer; }
.vvhi-stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 18px; text-align: center; }
.vvhi-stat-val { font-size: 28px; font-weight: 800; color: var(--gold); }
.vvhi-stat-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
  </style>
</head>
<body>

  <div class="scan-line"></div>

  <!-- LOGIN SCREEN — singurul, în afara app-container -->
  <div id="login-screen">
    <div class="logo-box">VV</div>
    <div class="logo-sub">CEO COMMAND CENTER</div>
    <input class="login-input" id="login-email" type="email"
      placeholder="Email CEO" autocomplete="username">
    <input class="login-input" id="login-pass" type="password"
      placeholder="Parolă" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') handleLogin(document.getElementById('login-email').value, document.getElementById('login-pass').value)">
    <button class="login-btn"
      onclick="handleLogin(document.getElementById('login-email').value, document.getElementById('login-pass').value)">
      INTRĂ
    </button>
  </div>

  <!-- APP — sidebar + main, injectate după login -->
  <div id="app-container"></div>

  <!-- LIGHTBOX — global -->
  <div id="lightbox" onclick="closeLightbox()">
    <span class="lb-close">✕</span>
    <span class="lb-nav lb-prev" onclick="event.stopPropagation();lightboxNav(-1)">‹</span>
    <img id="lb-img" src="" alt="">
    <span class="lb-nav lb-next" onclick="event.stopPropagation();lightboxNav(1)">›</span>
  </div>

  <script>
// ============================================================
// VV-TEAM CEO Panel — Fixed Version
// ============================================================

const db  = firebase.firestore();
const auth = firebase.auth();

const COIN_REWARD_DEFAULT = 10;
const RANKS = ['Neofit', 'Explorer', 'Trainer', 'Master', 'Fondator'];

let currentCEO     = null;
let currentSection = 'missions';
let lightboxImages = [];
let lightboxIndex  = 0;

// ── onSnapshot unsubscribe handles ──
let _circlePendingUnsub = null;
let _circleActiveUnsub  = null;

// ============================================================
// 1. AUTH
// ============================================================

firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(console.error);

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    document.getElementById('login-screen').classList.remove('hidden');
    return;
  }
  try {
    const userDoc = await db.collection('users').doc(user.uid).get();
    if (userDoc.exists && userDoc.data().role === 'ceo') {
      currentCEO = { uid: user.uid, ...userDoc.data() };
      // ── FIX: ascunde login screen înainte de a construi interfața ──
      document.getElementById('login-screen').classList.add('hidden');
      buildInterface();
      initDashboard();
    } else {
      console.warn('Rol insuficient.');
      document.getElementById('login-screen').classList.remove('hidden');
    }
  } catch (e) {
    console.error('Auth check error:', e);
    document.getElementById('login-screen').classList.remove('hidden');
  }
});

async function handleLogin(email, password) {
  const btn = document.querySelector('#login-screen .login-btn');
  if (btn) { btn.textContent = 'SE VERIFICĂ...'; btn.disabled = true; }
  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (error) {
    console.error('Login error:', error.message);
    if (btn) { btn.textContent = 'ACCES REFUZAT'; btn.disabled = false; setTimeout(() => { btn.textContent = 'INTRĂ'; }, 2000); }
  }
}

function handleLogout() {
  if (_circlePendingUnsub) { _circlePendingUnsub(); _circlePendingUnsub = null; }
  if (_circleActiveUnsub)  { _circleActiveUnsub();  _circleActiveUnsub  = null; }
  auth.signOut().then(() => { window.location.href = 'index.html'; });
}

// ============================================================
// 2. BUILD INTERFACE
// ============================================================

function buildInterface() {
  const app = document.getElementById('app-container');
  if (!app) return;

  app.innerHTML = `
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">VV TEAM</div>
        <div class="sidebar-subtitle">CEO PANEL</div>
      </div>
      <div class="system-money-box">
        <div class="money-label">VV Coins în sistem</div>

function showSection(name) {
  // Cleanup listeners Circle dacă plecăm de la ea
  if (currentSection === 'circle' && name !== 'circle') {
    if (_circlePendingUnsub) { _circlePendingUnsub(); _circlePendingUnsub = null; }
    if (_circleActiveUnsub)  { _circleActiveUnsub();  _circleActiveUnsub  = null; }
  }

  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  const sec = document.getElementById('section-' + name);
  const nav = document.getElementById('nav-' + name);
  if (sec) sec.classList.add('active');
  if (nav) nav.classList.add('active');
  currentSection = name;

  if (name === 'missions')    loadMissions('pending');
  if (name === 'contracts')   loadContracts();
  if (name === 'feedback')    loadFeedback();
  if (name === 'talent')      loadTalentPool();
  if (name === 'leaderboard') loadLeaderboard();
  if (name === 'keys')        loadKeys();
  if (name === 'audit')       loadAuditLog();
  if (name === 'map')         initCEOMap();
  if (name === 'vvhi')        loadVVhi();
  if (name === 'config')      loadConfig();
  if (name === 'circle')      switchCircleTab('pending');

  logCEOAction('NAV', 'Navigat la: ' + name);
}

async function initDashboard() {

async function loadBadgeCounts() {
  try {
    const [pending, contracts, feedback] = await Promise.all([
      db.collection('missions').where('status','==','pending').get(),
      db.collection('contracts').where('status','==','pending').get(),
      db.collection('feedback').where('status','==','nou').get()
    ]);
    setBadge('missions', pending.size);
    setBadge('contracts', contracts.size);
    setBadge('feedback', feedback.size);
  } catch (e) { console.error(e); }
}

function setBadge(name, count) {
  const el = document.getElementById('badge-' + name);
  if (!el) return;
  el.textContent = count;
  el.style.display = count > 0 ? 'inline-block' : 'none';
}

async function loadTotalCoins() {
  try {
    const snap = await db.collection('users').get();
    let total = 0;
    snap.forEach(d => { total += (d.data().vvCoins || 0); });
    const el = document.getElementById('total-coins');
    if (el) el.textContent = total + ' VVC';
  } catch (e) {}
}

async function loadMissions(status) {
  ['pending','approved','rejected'].forEach(s => {
    const t = document.getElementById('tab-' + s);
    if (t) t.classList.toggle('active', s === status);
  });
  const grid = document.getElementById('missions-grid');
  if (!grid) return;
  grid.innerHTML = '<div style="color:var(--text-muted);padding:20px">Se încarcă...</div>';
  try {
    const snap = await db.collection('missions').where('status','==',status).orderBy('createdAt','desc').get();
    if (snap.empty) { grid.innerHTML = '<div style="color:var(--text-muted);padding:20px">Nicio misiune cu statusul: ' + status + '</div>'; return; }
    grid.innerHTML = '';
    snap.forEach(doc => grid.appendChild(buildMissionCard({ id: doc.id, ...doc.data() })));
  } catch (e) {
    grid.innerHTML = '<div style="color:var(--danger);padding:20px">Eroare: ' + e.message + '</div>';
  }
}

function buildMissionCard(m) {
  const div = document.createElement('div');
  div.className = 'photo-card';
  div.id = 'mission-' + m.id;
  const imgSrc  = m.photoURL || m.imageUrl || '';
  const userName = m.userName || m.userId || 'Anonim';
  const reward   = m.reward || COIN_REWARD_DEFAULT;
  const date     = m.createdAt ? new Date(m.createdAt.seconds * 1000).toLocaleDateString('ro') : '—';
  div.innerHTML = `
    ${imgSrc ? `<img class="photo-img" src="${imgSrc}" alt="Misiune" onclick="openLightbox('${imgSrc}')">` : '<div style="height:120px;background:#111;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px">Fără imagine</div>'}
    <div class="photo-info">
      ${m.status === 'rejected' ? '<span class="flag-badge">RESPINSĂ</span>' : ''}
      <div class="photo-msg">${m.description || m.message || 'Fără descriere'}</div>
      <div class="photo-meta"><span>👤 ${userName}</span><span>📅 ${date}</span></div>
      <div class="photo-meta" style="margin-top:6px">
        <span>🪙 Reward: <b style="color:var(--gold)">${reward} VVC</b></span>
        <span>📍 ${m.location || '—'}</span>
      </div>
      ${m.status === 'pending' ? `<div class="action-row">
        <button class="btn-approve" onclick="approveMission('${m.id}','${m.userId}',${reward})">✅ Aprobă</button>
        <button class="btn-reject" onclick="rejectMission('${m.id}')">❌ Respinge</button>
      </div>` : ''}
      ${m.status === 'approved' ? `<div style="color:var(--safe-green);font-size:12px;margin-top:10px;font-weight:700">✅ Aprobată · +${reward} VVC distribuit</div>` : ''}
    </div>`;
  return div;
}

async function approveMission(missionId, userId, rewardAmount) {
  if (!confirm('Aprobi misiunea și distribui ' + rewardAmount + ' VV Coins?')) return;
  const batch = db.batch();
  try {
    batch.update(db.collection('missions').doc(missionId), { status: 'approved', validatedAt: firebase.firestore.FieldValue.serverTimestamp(), validatedBy: currentCEO?.uid || 'ceo' });
    if (userId && userId !== 'undefined') {
      batch.update(db.collection('users').doc(userId), { vvCoins: firebase.firestore.FieldValue.increment(rewardAmount), missionsApproved: firebase.firestore.FieldValue.increment(1) });
      batch.set(db.collection('transactions').doc(), { userId, amount: rewardAmount, type: 'mission_reward', missionId, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    }
    await batch.commit();
    logVVhi('APPROVE_MISSION', { missionId, userId, reward: rewardAmount });
    logCEOAction('APPROVE_MISSION', 'Misiune: ' + missionId + ' | +' + rewardAmount + ' VVC → ' + userId);
    db.collection('pulse_events').add({ type: 'mission', icon: '🎯', message: 'O misiune a fost <b>validată</b> de CEO · +' + rewardAmount + ' VVC', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    const card = document.getElementById('mission-' + missionId);
    if (card) card.remove();
    showNotif('✅ Misiune aprobată! +' + rewardAmount + ' VVC distribuit.');
    loadBadgeCounts();
  } catch (e) { showNotif('Eroare: ' + e.message, true); }
}

async function rejectMission(missionId) {
  if (!confirm('Respingi această misiune?')) return;
  try {
    await db.collection('missions').doc(missionId).update({ status: 'rejected', rejectedAt: firebase.firestore.FieldValue.serverTimestamp(), rejectedBy: currentCEO?.uid || 'ceo' });
    logVVhi('REJECT_MISSION', { missionId });
    logCEOAction('REJECT_MISSION', 'Misiune respinsă: ' + missionId);
    const card = document.getElementById('mission-' + missionId);
    if (card) card.remove();
    showNotif('Misiune respinsă.');
    loadBadgeCounts();
  } catch (e) { showNotif('Eroare: ' + e.message, true); }
}

async function deleteAllRejected() {
  if (!confirm('Ștergi toate misiunile respinse?')) return;
  try {
    const snap = await db.collection('missions').where('status','==','rejected').get();
    const batch = db.batch();
    snap.forEach(d => batch.delete(d.ref));
    await batch.commit();
    logCEOAction('DELETE_REJECTED', 'Șterse ' + snap.size + ' misiuni respinse');
    showNotif('🗑 ' + snap.size + ' misiuni șterse.');
    loadMissions('rejected');
  } catch (e) { showNotif('Eroare: ' + e.message, true); }
}

    snap.forEach(doc => {
      const c = { id: doc.id, ...doc.data() };
      const date = c.createdAt ? new Date(c.createdAt.seconds * 1000).toLocaleDateString('ro') : '—';
      const div = document.createElement('div');
      div.className = 'contract-card';
      div.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
          <div>
            <div style="font-size:15px;font-weight:700;margin-bottom:5px">${c.title || 'Contract fără titlu'}</div>
            <div style="font-size:13px;color:var(--text-muted)">${c.description || '—'}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:8px">👤 ${c.userId || 'Anonim'} · 📅 ${date} · 🪙 ${c.reward || 0} VVC</div>
          </div>
          <div style="display:flex;gap:8px;flex-shrink:0">
            <span style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid currentColor;background:${c.status==='pending'?'rgba(255,149,0,0.1)':c.status==='active'?'rgba(52,199,89,0.1)':'rgba(255,255,255,0.05)'};color:${c.status==='pending'?'#ff9500':c.status==='active'?'var(--safe-green)':'var(--text-muted)'}">${(c.status||'unknown').toUpperCase()}</span>
            ${c.status==='pending'?`<button class="btn-approve" style="padding:6px 12px;font-size:11px" onclick="activateContract('${c.id}')">Activează</button>`:''}
            <button class="btn-reject" style="padding:6px 12px;font-size:11px" onclick="deleteContract('${c.id}')">Șterge</button>

      list.appendChild(div);
    });
  } catch (e) { list.innerHTML = '<div style="color:var(--danger);padding:20px">Eroare: ' + e.message + '</div>'; }

async function deleteContract(id) {

  try { await db.collection('contracts').doc(id).delete(); logCEOAction('DELETE_CONTRACT', id); showNotif('Contract șters.'); loadContracts(); }
  catch (e) { showNotif('Eroare: ' + e.message, true); }
}

async function loadVVhi() {

    });
    tbody.innerHTML = html;
  } catch (e) { tbody.innerHTML = '<tr><td colspan="4" style="color:var(--danger)">Eroare: ' + e.message + '</td></tr>'; }
}

  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

async function deployCircleId(uid, alias, event) {
  if (!confirm('Ai verificat plata de 29 lei de la ' + alias + ' în Salt Bank?\n\nApasă OK pentru a activa identitatea VV·CORE.')) return;
  var btn = event.currentTarget;
  btn.textContent = 'SE DEPLOYEAZĂ...';
  btn.style.opacity = '0.6';
  btn.style.pointerEvents = 'none';

  try {
    // ── 1. Generează VV·CORE·ID unic ──
    var newCoreId = generateVVCoreId();
    var existing = await db.collection('contributors').where('vvCoreId','==',newCoreId).get();
    if (!existing.empty) newCoreId = generateVVCoreId();

    // ── 2. Generează VV·ID (identitate comportamentală) ──
    var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    var vvIdCode = 'VV·ID·';
    for (var i = 0; i < 6; i++) vvIdCode += chars[Math.floor(Math.random() * chars.length)];

    // ── 3. Contor atomic — founderNum unic garantat ──
    // Folosim transaction pe doc stats/founders
    var founderNum = await db.runTransaction(async function(transaction) {
      var statsRef = db.collection('stats').doc('founders');
      var statsDoc = await transaction.get(statsRef);
      var currentNum = statsDoc.exists ? (statsDoc.data().count || 0) : 0;
      var nextNum = currentNum + 1;
      transaction.set(statsRef, { count: nextNum }, { merge: true });
      return nextNum;
    });

    // ── 4. Motto pentru user ──
    var M=["Primul pas e singurul care contează.","Unii construiesc. Tu ai construit.","Înainte de val, era cineva pe plajă.","Nucleul a început cu tine.","Cei care cred primii schimbă tot.","Nu ai așteptat dovezi. Ai fost dovada.","Rădăcinile nu se văd, dar țin totul.","Ai pus o piatră când alții întrebau unde e clădirea.","Fiecare mare lucru a avut un prim om.","Tu ai fost acel om.","Viziunea ta a precedat realitatea.","Ai ales să fii real înainte ca restul să fie gata.","Fondatorii nu găsesc drumuri. Le fac.","Curajul tău a marcat un început.","Înainte de aplauze, există tăcerea fondatorilor.","Ai semnat înainte ca lumea să știe ce semnează.","Orice mișcare mare a început cu o decizie mică.","Ai luat-o tu.","Cei care vin după vor ști că tu ai fost primul.","Nu oricine vede potențialul. Tu l-ai văzut.","Contribuția ta e invizibilă pentru mulți, eternă pentru noi.","Ai ales să construiești, nu să aștepți.","Fondatorii nu găsesc drumuri. Le fac.","Ai pus primul punct pe o hartă goală.","Lumea nu știe încă ce ai făcut. Noi știm.","Acțiunile tale de azi sunt istoria de mâine.","Ești dovada că lucrurile bune încep discret.","Fundațiile nu se văd niciodată. Dar țin totul în picioare.","Ai crezut când era cel mai ușor să nu crezi.","Contribuția ta e o amprentă care nu dispare.","Ești parte din ADN-ul acestui univers.","Locul tău în nucleu nu poate fi luat de nimeni altcineva.","E al tău. Pentru totdeauna.","Primii 100 scriu regulile. Tu ești unul dintre ei.","Universul VV a început cu oameni ca tine.","Ești parte din ce construim. Ești parte din noi."];
    var h = 0;
    for (var ci = 0; ci < uid.length; ci++) h = uid.charCodeAt(ci) + ((h << 5) - h);
    var motto = M[Math.abs(h) % M.length];

    // ── 5. Batch write — totul atomat ──
    var batch = db.batch();

    // contributors doc
    batch.update(db.collection('contributors').doc(uid), {
      status: 'active',
      vvCoreId: newCoreId,
      vvId: vvIdCode,
      founderNum: founderNum,
      motto: motto,
      activatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      activatedBy: 'CEO'
    });

    // users doc — insigna de fondator + VV ID
    batch.set(db.collection('users').doc(uid), {
      isFounder: true,
      founderNum: founderNum,
      vvCoreId: newCoreId,
      vvId: vvIdCode,
      alias: alias,
      rank: 'Fondator',
      founderActivatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    await batch.commit();

    // ── 6. Inbox notificare user ──
    await db.collection('inbox').add({
      to: uid,
      type: 'circle_activated',
      message: '⬡ Identitatea ta VV·CORE a fost activată: ' + newCoreId +
        '\n🪪 VV ID: ' + vvIdCode +
        '\n🏆 Ești Fondator #' + founderNum + ' din 100.' +
        '\n\nBine ai venit în nucleul Universului VV.',
      vvCoreId: newCoreId,
      vvId: vvIdCode,
      founderNum: founderNum,
      read: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // ── 7. Log ──
    logVVhi('CIRCLE_DEPLOY', { uid, alias, vvCoreId: newCoreId, vvId: vvIdCode, founderNum });
    logCEOAction('CIRCLE_DEPLOY', alias + ' → ' + newCoreId + ' · #' + founderNum + ' · ' + vvIdCode);

    showNotif('✅ #' + founderNum + ' · ' + newCoreId + ' deploiat pentru ' + alias + '!');

  } catch (e) {
    showNotif('Eroare: ' + e.message, true);
    btn.textContent = '⬡ VERIFY & DEPLOY IDENTITY';
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  }
}

async function rejectCircle(uid) {
  if (!confirm('Respingi această cerere? Banii NU se returnează automat — fă-o manual din Salt Bank.')) return;
  try {
    await db.collection('contributors').doc(uid).update({ status: 'rejected', rejectedAt: firebase.firestore.FieldValue.serverTimestamp() });
    await db.collection('inbox').add({
      to: uid, type: 'circle_rejected',
      message: 'Cererea ta pentru VV Inner Circle nu a putut fi verificată. Contactează VV Team pentru detalii.',
      read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    logCEOAction('CIRCLE_REJECT', uid);
    showNotif('Cerere respinsă.');
  } catch (e) { showNotif('Eroare: ' + e.message, true); }
}
